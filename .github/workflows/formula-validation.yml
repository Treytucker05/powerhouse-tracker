name: Formula Validation

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      
      - name: Install dependencies
        run: |
          corepack enable          # activates pnpm on the runner
          pnpm install --frozen-lockfile
          
      - name: Run full CI
        run: npm run ci
